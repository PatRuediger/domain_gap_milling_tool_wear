# General configuration
inputPath: "./data/nasa_milling_normalized.parquet"
output_parent_dir: "./experiments/conv_n_vs_2"
wearColumnName: 'wear_norm'
wearTH: 0.45
signalColumns: ['vib_spindle']
labelColumn: 'wear_class'
signal_length: 9000
pooling_type: 'mean' # 'mean' or 'max'

# Model selection: 'lstm', '1d_conv', or 'autoencoder'
model_type: '1d_conv' 

# Train/Test split for classification models
train_caseIDs: [2,5,7,10]
test_caseIDs: [12,15]

# Training parameters for classification models
epochs: 150
batch_size: 32
validation_split: 0.2
verbose: 2

# Autoencoder specific parameters
train_split_ratio: 0.8 # for healthy data
downsample_rate: 5
clip_range: [-10, 10]
