# config_domain_adaption.yaml

# --- Execution Mode ---
# Options: 'train', 'inference', 'transfer_learn'
mode: inference 

# --- General Parameters ---
batch_size: 32
epochs: 150
signal_length: 9216
pooling_type: mean
signalColumns:
- vib_spindle
labelColumn: wear_class
wearColumnName: wear_norm
wearTH: 0.6
verbose: 2
model_type: 1d_conv # Used for naming and selecting the pipeline
output_parent_dir: ./experiments/nasa_milling_1dconv

# --- Initial Training Configuration (Used for 'train' mode) ---
inputPath: /path/to/data/nasa_milling_normalized.parquet
train_caseIDs: [2, 3, 4, 6, 7, 8, 12, 14, 15, 16] # not used in inference mode
test_caseIDs: [17, 23, 26, 33] # not used in inference mode
validation_split: 0.2 # not used in inference mode

# --- Inference Tasks (Used for 'inference' mode) ---
# A list of inference jobs to run.
