# config_domain_adaption.yaml

# --- Execution Mode ---
# Options: 'train', 'inference', 'transfer_learn'
mode: transfer_learn 

# --- General Parameters ---
batch_size: 32
epochs: 150
signal_length: 9216
pooling_type: mean
signalColumns:
- vib_spindle
labelColumn: wear_class
wearColumnName: wear_norm
wearTH: 0.6
verbose: 2
model_type: 1d_conv # Used for naming and selecting the pipeline
output_parent_dir: ./experiments/DA_nature_to_others

# --- Initial Training Configuration (Used for 'train' mode) ---
inputPath: /path/to/your/data/nature_milling_2025_normalized.parquet
train_caseIDs: [2, 3, 4, 6, 7, 8, 12, 14, 15, 16]
test_caseIDs: [17, 23, 26, 33]
validation_split: 0.2

# --- Inference Tasks (Used for 'inference' mode) ---
# A list of inference jobs to run.
inference_tasks:
  - model_path: /path/to/your/trained/model/1d_conv_model_20251013_120000 # IMPORTANT: Path without extension
    inputPath: /path/to/your/data/nasa_milling_normalized.parquet
    test_caseIDs: [1, 2, 3] # Case IDs from the nasa_milling dataset
  - model_path: /path/to/your/trained/model/1d_conv_model_20251013_120000
    inputPath: /path/to/your/data/phm2007_milling_normalized.parquet
    test_caseIDs: [1, 2] # Case IDs from the phm2007_milling dataset

# --- Transfer Learning Tasks (Used for 'transfer_learn' mode) ---
# A list of transfer learning jobs to run.
transfer_learning_tasks:
  - model_path: /path/to/your/trained/model/1d_conv_model_20251013_120000 # Source model
    inputPath: /path/to/your/data/nasa_milling_normalized.parquet
    train_caseIDs: [1, 2] # Small training set from the new domain
    test_caseIDs: [3, 4] # Test set from the new domain
  - model_path: /path/to/your/trained/model/1d_conv_model_20251013_120000
    inputPath: /path/to/your/data/phm2007_milling_normalized.parquet
    train_caseIDs: [1]
    test_caseIDs: [2]